spring:
  application:
    name: appointment-manager
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appointment_db}
    username: ${SPRING_DATASOURCE_USERNAME:appointment}
    password: ${SPRING_DATASOURCE_PASSWORD:appointment}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: Asia/Ho_Chi_Minh

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: ${APP_JWT_SECRET:appointment-manager-local-secret-key-change-in-production-2026}
    expiration-hours: ${APP_JWT_EXPIRATION_HOURS:8}
