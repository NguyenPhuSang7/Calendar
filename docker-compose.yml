services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appointment_db}
      POSTGRES_USER: ${POSTGRES_USER:-appointment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appointment}
    ports:
      - "5432:5432"
    volumes:
      - appointment_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appointment} -d ${POSTGRES_DB:-appointment_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-appointment_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-appointment}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-appointment}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-appointment-manager-docker-secret-key-change-before-production-2026}
      APP_JWT_EXPIRATION_HOURS: ${APP_JWT_EXPIRATION_HOURS:-8}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  appointment_postgres:
