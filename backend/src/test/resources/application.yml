spring:
  datasource:
    url: jdbc:h2:mem:appointment-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  main:
    allow-bean-definition-overriding: true

app:
  cors:
    allowed-origins: http://localhost:5173
  jwt:
    secret: appointment-manager-test-secret-key-with-at-least-thirty-two-bytes
    expiration-hours: 8
